<!DOCTYPE html>
<html>
<head>
  <title>Card Layout</title>

  <style>

    body{
      font-family: Arial;
      background-color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    .container{
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card{
      background-color: white;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0px 2px 8px gray;
      overflow: hidden;
    }

    .card img{
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-content{
      padding: 15px;
    }

    .card h2{
      margin: 0;
    }

    .card p{
      color: gray;
    }

    .btn{
      display: inline-block;
      background-color: blue;
      color: white;
      padding: 10px 15px;
      text-decoration: none;
      border-radius: 5px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="card">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ52exfju_smQMPdjOIaLNMhab_GADjhZCl7g&s">

      <div class="card-content">
        <h2>CodingStar</h2>

        <p>Subscribe</p>

        <a href="#" class="btn">Mern Stack</a>
      </div>
    </div>

      
   

</body>
</html>
