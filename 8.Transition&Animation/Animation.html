<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color:red;
            width:100PX;
            height: 100px;
            border:solid 2px black;
            animation-name: pop-in-out;
            animation-duration: 2s;
            animation-delay:1s ;
            animation-iteration-count: infinite;

        }
        @keyframes pop-in-out {
            
                0%{
                    background-color: aqua;
                    margin-left: 0px;
                    border-radius: 100px;
                }
                25%{
                    background-color: blue;
                    margin-left: 200px;
                    margin-top: 0px;
                }
            
                75%{
                    background-color: aqua;
                    margin-top:200px ;
                    margin-left: 200px;
                    border-radius: 100px;
                }
                100%{
                    background-color: yellow;
                    margin-left: 0px;
                    margin-top: 200px;
                }
                
            }
            /* from{
                background-color: aqua;
                margin-left: 0px;

            }
            to{
                margin-left: 100px;

            } */
        
    </style>
</head>
<body>
    <div id="box">Box</div>
</body>
</html>
